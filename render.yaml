services:
  - type: web
    name: customer-details-backend
    env: python
    buildCommand: "cd customer && pip install -r requirements.txt"
    startCommand: "cd customer && gunicorn customer.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SETTINGS_MODULE
        value: customer.settings
