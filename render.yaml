services:
  - type: web
    name: customer-details-backend
    env: python
    buildCommand: "pip install -r customer/requirements.txt"
    startCommand: "cd customer && python -m gunicorn customer.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SETTINGS_MODULE
        value: customer.settings
